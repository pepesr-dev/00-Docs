<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Sections</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <h1>Animaciones CSS</h1>
    <!--Las graficas se construyen creando div de
    diferentes tamaños y colores dentro de un contenedor.
    -->

    <!--Barras-->
    <div class="grafica">
        <div class="barra" style="height: 60%;"></div>
        <div class="barra" style="height: 30%;"></div>
        <div class="barra" style="height: 50%;"></div>
        <div class="barra" style="height: 10%;"></div>
    </div>
    <!--SECTORES-->
    <br>
    <di class="sectores">
        <div class="sector uno"></div>
        <div class="sector dos"></div>
        <div class="sector tres"></div>
        <div class="sector cuatro"></div>
    </di>
    
    
    
</body>
</html>
