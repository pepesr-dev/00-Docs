<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Sections</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <h1>Animaciones CSS</h1>
    <!--Las graficas se construyen creando div de
    diferentes tamaños y colores dentro de un contenedor.
    -->
    <button id="derecha">derecha</button>
    <!-- * Aria alabel (accesibilidad)-->
    <!--Barras-->
    <div class="grafica" aria-label="Diagrama de barras">
        <div class="barra" style="height: 60%;"></div>
        <div class="barra" style="height: 30%;"></div>
        <div class="barra" style="height: 50%;"></div>
        <div class="barra" style="height: 10%;"></div>
    </div>
    <!--SECTORES-->
    <br>
    <div class="sectores" aria-label="Diagrama de sectores">
        <div class="sector uno"></div>
        <div class="sector dos"></div>
        <div class="sector tres"></div>
        <div class="sector cuatro"></div>
    </div>
    <div class="zonas">
        <canvas id="miCanvas" width="500" height="400" style="border:1px solid #000;">
            
        </canvas>
        <div id="leyenda">
        </div>
        <button id="iniciar">Iniciar</button>
    </div>
    
    
</body>
</html>
